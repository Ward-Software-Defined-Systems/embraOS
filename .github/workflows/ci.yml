# embraOS CI — Rust-level regression net (added 2026-07-18, William-directed).
#
# Deliberate scope: workspace tests, the musl static cross-build (the ship
# path, minus Buildroot), and invariant guards. This complements — never
# replaces — the local pipeline (build-image.sh → Buildroot → QEMU boot
# against existing DATA), which remains the authority for image/runtime
# validation.
#
# The toolchain is pinned HERE (workflow-only, matching the wsds-devops dev
# host) so CI doesn't drift with the runner image; bump RUST_TOOLCHAIN
# deliberately. An aarch64 job is queued until the x86_64 pipeline is proven.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.1"
  # Matches the wsds-devops install (cargo install trunk --locked); bump deliberately.
  TRUNK_VERSION: "0.21.14"

jobs:
  # embra-web embeds crates/embra-web-ui/dist via rust-embed at COMPILE time,
  # and dist/ is gitignored Trunk output — a fresh checkout cannot compile
  # embra-web without it (build-image.sh Step 0.5 is what creates it locally).
  # This job mirrors Step 0.5 and hands dist/ to the compile jobs, which also
  # puts the WASM frontend build under CI for the first time.
  frontend:
    name: embra-web-ui (Trunk → WASM, Step 0.5)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/embra-web-ui
          cache-on-failure: true
      - name: Install trunk (pinned; ~/.cargo/bin rides the cache)
        run: |
          if ! trunk --version 2>/dev/null | grep -q "trunk ${TRUNK_VERSION}\$"; then
            cargo install trunk --locked --version "${TRUNK_VERSION}" --force
          fi
          trunk --version
      - name: trunk build --release
        run: cd crates/embra-web-ui && trunk build --release
      - uses: actions/upload-artifact@v4
        with:
          name: embra-web-ui-dist
          path: crates/embra-web-ui/dist
          if-no-files-found: error
          retention-days: 1

  guards:
    name: Invariant guards (storage pins)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Storage-critical lock pins match the vendored WardSONDB's tested set
        run: |
          # The seven pins carry on-disk-format compat with production DATA
          # (CLAUDE.md "vendored FORK" invariant; vendor commit 3dc3e29 landed
          # them at exactly upstream's regression-tested lock). A Dependabot
          # or casual `cargo update` bump must fail loudly here — changing
          # one is a deliberate divergence decision, not routine maintenance.
          set -euo pipefail
          check() {
            local name="$1" want="$2" n got
            n=$(grep -c "^name = \"$name\"\$" Cargo.lock || true)
            if [ "$n" != "1" ]; then
              echo "::error::$name: expected exactly 1 lock entry, found $n"
              return 1
            fi
            if ! grep -A1 "^name = \"$name\"\$" Cargo.lock | grep -q "^version = \"$want\"\$"; then
              got=$(grep -A1 "^name = \"$name\"\$" Cargo.lock | grep '^version' || true)
              echo "::error::$name pin drift: $got (expected \"$want\")"
              return 1
            fi
            echo "ok: $name $want"
          }
          fail=0
          check fjall               2.11.2         || fail=1
          check lsm-tree            2.10.4         || fail=1
          check value-log           1.9.0          || fail=1
          check rust-rocksdb        0.46.0         || fail=1
          check rust-librocksdb-sys 0.42.0+10.10.1 || fail=1
          check roaring             0.10.12        || fail=1
          check tikv-jemallocator   0.6.1          || fail=1
          exit $fail

  test:
    name: Workspace tests + wardsondb lint ratchet
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Fetch embra-web-ui dist (rust-embed compile-time dependency)
        uses: actions/download-artifact@v4
        with:
          name: embra-web-ui-dist
          path: crates/embra-web-ui/dist
      - name: System deps (protoc for tonic-build, libclang for bindgen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: cargo test --workspace
        run: cargo test --workspace --locked
      - name: wardsondb stays clippy-clean (ratchet — zero warnings at vendor time)
        run: cargo clippy -p wardsondb --all-targets --locked -- -D warnings

  musl-cross:
    name: musl static cross-build (ship path)
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Fetch embra-web-ui dist (rust-embed compile-time dependency)
        uses: actions/download-artifact@v4
        with:
          name: embra-web-ui-dist
          path: crates/embra-web-ui/dist
      - name: System deps (protoc for tonic-build, libclang for bindgen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
          cache-on-failure: true
      - name: Cache Bootlin musl cross-toolchain
        id: musl-cache
        uses: actions/cache@v4
        with:
          path: ~/bootlin
          key: bootlin-x86-64-musl-stable-2025.08-1
      - name: Install Bootlin musl cross-toolchain
        if: steps.musl-cache.outputs.cache-hit != 'true'
        run: |
          # CI uses Bootlin's Buildroot-built musl toolchain (gcc 14.3.0,
          # CDN-hosted, reliable from runners) — NOT the musl.cc toolchain
          # the image builds use: musl.cc drops connections from GitHub's IP
          # space (runs 1-2 died on connect-timeout while the same URL serves
          # fine elsewhere), so exact-parity CI would need an org-hosted
          # mirror (open follow-up). This job validates the ship SHAPE —
          # same triple, static-pie, musl-linked C++ (RocksDB) — with the
          # exact toolchain parity remaining a local build-host property.
          # sha256 pinned from a verified 2026-07-18 download; bump the pin
          # AND the cache key together, deliberately.
          set -euo pipefail
          want_sha=09fca3aa89540f1b01b5f4210d488cbeb00f522044c53e9989b1dd8a38076912
          url=https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--musl--stable-2025.08-1.tar.xz
          for i in 1 2 3; do
            curl -fSL --connect-timeout 20 --max-time 600 -o /tmp/bootlin-musl.tar.xz "$url" && break
            [ "$i" = 3 ] && break
            echo "download attempt $i failed; retrying in $((i * 20))s"
            sleep $((i * 20))
          done
          echo "$want_sha  /tmp/bootlin-musl.tar.xz" | sha256sum -c -
          mkdir -p ~/bootlin
          tar -xJf /tmp/bootlin-musl.tar.xz -C ~/bootlin
          # Buildroot SDKs bake their build path into the compiler wrappers;
          # relocate-sdk.sh rewrites them for the extracted location (the
          # cached copy keeps the relocated paths — runner HOME is stable).
          ~/bootlin/x86-64--musl--stable-2025.08-1/relocate-sdk.sh
      - name: Cross-build (build-image.sh Step 1 shape)
        run: |
          export PATH="$HOME/bootlin/x86-64--musl--stable-2025.08-1/bin:$PATH"
          export CC_x86_64_unknown_linux_musl=x86_64-buildroot-linux-musl-gcc
          export CXX_x86_64_unknown_linux_musl=x86_64-buildroot-linux-musl-g++
          export AR_x86_64_unknown_linux_musl=x86_64-buildroot-linux-musl-ar
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-buildroot-linux-musl-gcc
          cargo build --release --target x86_64-unknown-linux-musl --locked
      - name: All shipped binaries produced
        run: |
          set -euo pipefail
          for bin in embra-init embrad embra-apid embra-trustd embra-brain embra-console embra-web wardsondb; do
            p="target/x86_64-unknown-linux-musl/release/$bin"
            test -x "$p" || { echo "::error::missing binary: $bin"; exit 1; }
            file "$p"
          done
