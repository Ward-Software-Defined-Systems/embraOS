image boot.vfat {
    vfat {
        files = {
            "bzImage"
        }
    }
    size = 64M
}

/* rootfs.squashfs is pre-built by Buildroot — genimage finds it in the images dir */

image state.ext4 {
    ext4 {
        label = "STATE"
        use-mke2fs = true
    }
    size = 256M
    empty = true
}

image data.ext4 {
    ext4 {
        label = "DATA"
        use-mke2fs = true
    }
    size = 2G
    empty = true
}

image embraos.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition boot {
        partition-type-uuid = C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        image = boot.vfat
    }

    partition rootfs {
        image = rootfs.squashfs
    }

    partition state {
        image = state.ext4
    }

    partition data {
        image = data.ext4
    }
}
